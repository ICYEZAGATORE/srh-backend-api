# Render Blueprint for the SRH Backend API.
# Deploy via Render Dashboard → "New +" → "Blueprint" and point it at this repo.
#
# This reuses an EXISTING free PostgreSQL database (Render's free tier allows
# only one), so the database is not created here. Set DATABASE_URL manually in
# the dashboard (it is a secret and must not live in this repo) — paste the
# existing database's INTERNAL connection string.

services:
  - type: web
    name: srh-backend-api
    runtime: docker
    plan: free
    region: virginia            # must match the database's region for the internal URL
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    # Free tier has no pre-deploy hook, so a startup script migrates then serves.
    # Pointing at the script (vs. an inline quoted command) avoids Render's
    # command parsing splitting the quotes and failing with exit 127.
    dockerCommand: sh /app/entrypoint.sh
    envVars:
      - key: DATABASE_URL
        sync: false             # set manually: paste the DB's Internal connection string
      - key: ADMIN_API_KEY
        generateValue: true     # Render generates a strong secret
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_UNSAFE_TEXT
        value: "false"
      # ── RAG / LLM ────────────────────────────────────────────────────────
      # Free tier = 512 MB RAM: compute embeddings via the HF Inference API so
      # torch / sentence-transformers are never loaded locally (loading them
      # here OOMs and 502s /chat).
      - key: EMBEDDING_BACKEND
        value: hf_api
      # Required for LLM generation AND the hf_api embedding path. Secret.
      - key: HF_API_TOKEN
        sync: false
      - key: LLM_MODEL
        value: Qwen/Qwen2.5-7B-Instruct
      # Vector store: Pinecone (cloud) — Render's disk is ephemeral, so a local
      # Chroma store would not persist. The index must be seeded with the KB
      # (same embedding model) before retrieval returns grounding.
      - key: VECTOR_STORE_BACKEND
        value: pinecone
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: srh-knowledge-base
      # Kinyarwanda uses a stronger multilingual embedder (bge-m3, 1024-d) in its
      # own Pinecone index; English stays on MiniLM (384-d, index above). Queries
      # are routed by detected language in retrieve_context.
      - key: RW_EMBEDDING_MODEL
        value: BAAI/bge-m3
      - key: RW_EMBEDDING_DIM
        value: "1024"
      - key: RW_PINECONE_INDEX_NAME
        value: srh-knowledge-base-rw
      # ── Kinyarwanda pipeline (English path unaffected) ───────────────────
      # "native" (default) keeps the current bge-m3 rw retrieval + direct rw
      # generation. Flip to "translate" to route rw via the English path
      # (rw→en→RAG→en→rw); that requires a TRANSLATION_PROVIDER below.
      - key: KINYARWANDA_PIPELINE_MODE
        value: native
      # FAQ cache: high-similarity lookup of curated rw Q&A before RAG. The
      # cache file is built offline (scripts/build_faq_cache.py) and shipped in
      # the image under data/; if absent the cache is simply a no-op.
      - key: FAQ_CACHE_ENABLED
        value: "true"
      - key: FAQ_SIMILARITY_THRESHOLD
        value: "0.90"
      # Translation provider (used only when KINYARWANDA_PIPELINE_MODE=translate).
      - key: TRANSLATION_PROVIDER
        value: google
      - key: TRANSLATION_TIMEOUT_SECONDS
        value: "10"
      - key: BACK_TRANSLATION_SIMILARITY_THRESHOLD
        value: "0.75"
      # Provider credentials — secrets, set manually in the dashboard.
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
      - key: NLLB_ENDPOINT_URL
        sync: false
      - key: DIGITAL_UMUGANDA_MODEL_ID
        sync: false
      # Allow the deployed frontend origin (CORS). Comma-separated for multiples.
      - key: CORS_ALLOW_ORIGINS
        value: https://srh-frontend.vercel.app
