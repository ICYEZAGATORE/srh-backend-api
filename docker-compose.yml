services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: srh_user
      POSTGRES_PASSWORD: srh_pass
      POSTGRES_DB: srh_db
    ports:
      - "5432:5432"
    volumes:
      - srh_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U srh_user -d srh_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # Apply migrations, then start the API.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  srh_pgdata:
